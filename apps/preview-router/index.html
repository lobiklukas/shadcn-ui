<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview Router</title>
  </head>
  <body>
    <div id="app" class="style-nova"></div>
    <script type="module">
      // Thin router: reads /preview/{framework}/{component} and redirects
      // to the framework-specific SPA at /preview/{framework}/
      const path = window.location.pathname
      const match = path.match(/^\/preview\/(vue|svelte|ember)\//)
      if (match) {
        // Framework SPA handles this path — redirect to its index.html
        // The SPA's base path matches, so Vite SPA routing takes over
        window.location.replace(path)
      } else {
        document.getElementById("app").innerHTML =
          "<p>Usage: /preview/{vue|svelte|ember}/{component-name}</p>"
      }
    </script>
  </body>
</html>
